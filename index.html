<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHARISMA LAB | 極限拉扯實驗室</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@900&family=Noto+Sans+TC:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #f3e8ff; --main: #000; --white: #fff;
            --orange: #ff9000; --theme-color: #ff9000; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg); font-family: 'Lexend', 'Noto Sans TC', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px; transition: background-color 0.5s;
            overflow-x: hidden;
        }

        .container {
            width: 100%; max-width: 420px; background: var(--white);
            border: 6px solid var(--main); box-shadow: 12px 12px 0px var(--main);
            padding: 35px 25px; position: relative; z-index: 10; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 進度條 */
        .progress-bar-wrap { width: 100%; height: 12px; border: 3px solid var(--main); margin-bottom: 25px; background: #eee; }
        #progress-inner { width: 0%; height: 100%; background: var(--theme-color); transition: width 0.3s; }

        .typing::after { content: '|'; animation: blink 0.7s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .tag {
            background: var(--main); color: var(--white); display: inline-block;
            padding: 4px 12px; font-size: 10px; font-weight: 900; margin-bottom: 15px;
            letter-spacing: 1px; text-transform: uppercase;
        }

        h1 { font-size: 38px; font-weight: 900; line-height: 0.95; margin-bottom: 25px; letter-spacing: -1px; }

        .btn {
            background: var(--orange); border: 4px solid var(--main);
            padding: 18px; font-size: 18px; font-weight: 900;
            cursor: pointer; box-shadow: 6px 6px 0px var(--main);
            width: 100%; transition: all 0.1s; margin-top: 15px;
            text-transform: uppercase; color: var(--main); outline: none;
        }
        .btn:active { transform: translate(3px, 3px); box-shadow: 0px 0px 0px; }

        #quiz-page, #result-page { display: none; }
        
        #question { 
            font-size: 22px; font-weight: 900; margin-bottom: 25px; line-height: 1.4;
            min-height: 100px; border-left: 8px solid var(--main); padding-left: 15px;
        }
        
        .opt {
            background: var(--white); border: 3px solid var(--main);
            padding: 14px; font-size: 15px; font-weight: 800;
            text-align: left; cursor: pointer; margin-bottom: 10px;
            box-shadow: 4px 4px 0px var(--main); width: 100%; transition: all 0.1s;
            outline: none;
        }
        @media (hover: hover) { .opt:hover { background: #f8f8f8; } }
        .opt:active { background: #eee; transform: translate(2px, 2px); box-shadow: 2px 2px 0px var(--main); }

        #score-display { font-size: 90px; font-weight: 900; letter-spacing: -5px; margin: 10px 0; line-height: 1; }
        #rank-zh { font-size: 28px; font-weight: 900; margin-bottom: 8px; }
        #rank-quote { font-size: 15px; font-weight: 800; font-style: italic; margin-bottom: 15px; color: #444; border-left: 4px solid #ddd; padding-left: 10px; }
        #rank-desc { font-size: 13px; font-weight: 700; line-height: 1.6; color: #666; margin-bottom: 25px; }

        .black-mode { background-color: #000 !important; }
        .dark-container { background: #111 !important; border-color: var(--theme-color) !important; box-shadow: 12px 12px 0px var(--theme-color) !important; color: #fff !important; }
        .dark-subtext { color: #aaa !important; border-color: #333 !important; }

        .share-hint { font-size: 10px; font-weight: 900; color: #888; border-top: 2px dashed #ccc; padding-top: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="container" id="main-box">
    <div id="start-page">
        <div class="tag">CHARISMA LAB // VER 5.0</div>
        <h1>極限<br>拉扯<br>實驗室</h1>
        <p style="font-weight: 800; margin-bottom: 25px; line-height: 1.5;">[ 深度鑑定 ] 從 30 項指標中隨機抽樣，精確診斷你的社交人格底色。</p>
        <button class="btn" onclick="startQuiz()">啟動診斷 [START]</button>
    </div>

    <div id="quiz-page">
        <div class="progress-bar-wrap"><div id="progress-inner"></div></div>
        <div class="tag">DIAGNOSING <span id="progress-text">1 / 5</span></div>
        <div id="question" class="typing"></div>
        <div id="options"></div>
    </div>

    <div id="result-page">
        <div class="tag">FINAL CLINICAL REPORT</div>
        <div id="score-display">0.0</div>
        <div id="rank-zh"></div>
        <div id="rank-quote"></div>
        <div id="rank-desc" class="sub-txt"></div>
        <button class="btn" id="retry-btn" onclick="location.reload()"></button>
        <div class="share-hint">SCREENSHOT TO SHARE #CHARISMALAB</div>
    </div>
</div>

<script>
    let score = 0, currentIdx = 0, selectedBank = [];
    let isTyping = false;


        // 每題權重嚴格遵守 [2.0, 1.0, 0.5, 0.0]
    const fullBank = [
{ s: "對方回覆你訊息只有一個字：『嗯。』", o: ["回：『你這個字，是省流版想我？』", "回一個：『哦？』把球丟回去", "傳張梗圖：『幫你補點人味』", "立刻追問：『你是不是不愛了？』"], w: [2.0, 1.5, 0.5, 0.0] },
{ s: "深夜 11 點，對方突然傳：『睡了嗎？』", o: ["回：『還沒，正在等一個會心動的人找我。』", "回：『未呀，你是不是想我想到失眠？』", "回：『還沒，怎麼啦？』", "回：『有事快說。』"], w: [2.0, 1.5, 0.5, 0.0] },
{ s: "對方已讀很久才回：『剛剛在忙。』", o: ["回：『理解，畢竟不是每個人都有空想我。』", "回：『好啦，忙完記得回來報到。』", "回：『辛苦了。』", "回：『你到底在忙什麼忙成這樣？』"], w: [2.0, 1.5, 0.5, 0.0] },
{ s: "對方問：『有沒有想我？』", o: ["回：『有，差點影響我正常發揮魅力。』", "回：『有啊，但我表現得很專業。』", "回：『有一點。』", "回：『你怎麼突然這樣問？』"], w: [2.0, 1.5, 0.5, 0.0] },
{ s: "約會結帳時，對方完全沒拿錢的意思。", o: ["回：『這餐你請，我負責讓你覺得值回票價。』", "回：『我先付，下次你補一場。』", "默默買單，回家打開備忘錄記仇", "坐著不動，和空氣一起尷尬"], w: [2.0, 1.5, 0.5, 0.0] },
{ s: "對方問：『你之前談過幾段？』", o: ["回：『夠我出書，但你比較像限定典藏版。』", "回：『幾段，但我現在比較想研究你。』", "老實開始交代完整戀愛史", "回：『關你什麼事？』"], w: [2.0, 1.5, 0.5, 0.0] },
{ s: "對方開玩笑說你最近變胖了。", o: ["回：『沒辦法，最近幸福感有點超載。』", "回：『是魅力變厚，不是人。』", "回：『最近真的吃比較多。』", "立刻自卑：『我是不是很醜？』"], w: [2.0, 1.5, 0.5, 0.0] },
{ s: "對方說：『你跟我某個前任有點像。』", o: ["回：『那我應該是升級豪華版。』", "回：『我不喜歡撞款，我喜歡獨家。』", "回：『哪裡像？你還忘不了？』", "開始追問對方前任所有細節"], w: [2.0, 1.5, 0.5, 0.0] },
{ s: "對方說：『明天很忙，可能沒空找你。』", o: ["回：『好啊，那你忙，我負責繼續迷人。』", "回：『行，忙完再來找我領號碼牌。』", "回：『好。』", "回：『忙什麼？跟誰？去邊？』"], w: [2.0, 1.5, 0.5, 0.0] },
{ s: "對方斷聯三天後突然出現：『嗨。』", o: ["回：『你這個出場方式，很像限定返場嘉賓。』", "回：『喲，終於從平行宇宙回來了？』", "回：『嗨，好久不見。』", "回：『你還知道回來？我以為你沒了。』"], w: [2.0, 1.5, 0.5, 0.0] },
{ s: "對方送了你一個你其實不太喜歡的禮物。", o: ["回：『這份禮物很有創意，下次可以直接送你自己。』", "回：『哈哈這個選品路線很有你。』", "回：『謝謝，你有心。』", "當場露出嫌棄表情"], w: [2.0, 1.5, 0.5, 0.0] },
{ s: "對方問：『如果我消失，你會找我嗎？』", o: ["回：『會，但我希望你是因為想我，不是因為失蹤。』", "回：『會啊，至少確認你是不是跑去偷偷喜歡別人。』", "回：『會。』", "回：『你現在是在演哪齣？』"], w: [2.0, 1.5, 0.5, 0.0] },
{ s: "對方稱讚你今天很好看。", o: ["回：『你今天眼光也很好。』", "回：『知道你會這樣說，我今天有備而來。』", "回：『謝謝。』", "回：『沒有啦，普通而已。』"], w: [2.0, 1.5, 0.5, 0.0] },
{ s: "對方社群上發了和某個異性的合照。", o: ["去點讚，順便發一張自己更像主角的照片", "當沒事，心裡默念：朕不在乎", "私訊問：『那位是？』", "發emo文：『原來熱情也會過期。』"], w: [2.0, 1.5, 0.5, 0.0] },
{ s: "見面時，對方一直在滑手機。", o: ["笑說：『你先陪它，我等等再競標你的注意力。』", "說：『我本人都在這了，手機還贏？』", "自己也開始滑手機", "全程悶著，回家才內傷"], w: [2.0, 1.5, 0.5, 0.0] },
{ s: "對方問：『我們現在算什麼關係？』", o: ["回：『看你要不要把曖昧升級成正式版本。』", "回：『我對你不是玩玩。』", "回：『你怎麼定義都行。』", "回：『不知道。』"], w: [2.0, 1.5, 0.5, 0.0] },
{ s: "對方說：『我覺得我們不太合適。』", o: ["回：『可惜了，差點就湊成一段都市傳說。』", "回：『好，我尊重你，但你會錯過滿有趣的人。』", "回：『為什麼？我可以改。』", "回一長串控訴小作文"], w: [2.0, 1.5, 0.5, 0.0] },
{ s: "對方丟來一首歌，沒有多說什麼。", o: ["回另一首：『收到，這首算我給你的彩蛋。』", "回：『這首不錯，你是在偷偷表態？』", "回：『好聽。』", "開始逐句分析歌詞，腦補到大結局"], w: [2.0, 1.5, 0.5, 0.0] },
{ s: "你約會遲到 15 分鐘，對方看起來不太爽。", o: ["回：『我遲到不對，但我本人應該還算有誠意。』", "回：『抱歉，等下請你喝東西補償。』", "一直瘋狂道歉", "假裝沒事直接坐下"], w: [2.0, 1.5, 0.5, 0.0] },
{ s: "對方問：『你有沒有想過未來？』", o: ["回：『有，但我通常先看眼前這位值不值得我規劃。』", "回：『有啊，我喜歡慢慢走向明確。』", "當場開始講婚禮流程", "回：『沒有，未來太遠。』"], w: [2.0, 1.5, 0.5, 0.0] },
{ s: "你發現對方還在玩交友軟體。", o: ["回：『原來你還在市場流通，競爭挺激烈。』", "回：『如果你還在看別人，我會重新評估你的位置。』", "偷偷開帳號去觀察對方", "躲起來懷疑自己不夠好"], w: [2.0, 1.5, 0.5, 0.0] },
{ s: "對方說自己生病了。", o: ["回：『先休息，康復後再回來迷戀我。』", "回：『有看醫生嗎？多休息。』", "回：『多喝熱水。』", "瘋狂傳醫學文章像在準備答辯"], w: [2.0, 1.5, 0.5, 0.0] },
{ s: "對方帶你去認識自己的朋友。", o: ["自然接梗，三分鐘讓全場記住你", "大方得體地聊天", "只會站在旁邊尷尬微笑", "全程低頭滑手機"], w: [2.0, 1.5, 0.5, 0.0] },
{ s: "對方說：『你太好了，我配不上你。』", o: ["回：『那你就努力一點，別讓我失望。』", "回：『別急著下結論，你可以先好好表現。』", "回：『沒有啦，是我不夠好。』", "回：『對，你確實配不上。』"], w: [2.0, 1.5, 0.5, 0.0] },
{ s: "你在忙，對方卻一直連發訊息找你。", o: ["回：『先等我拯救完世界，晚點再專心寵你。』", "回：『我在忙，晚點回你。』", "已讀不回", "回：『可不可以不要煩？』"], w: [2.0, 1.5, 0.5, 0.0] },
{ s: "對方忘了你們之間一個重要日子。", o: ["回：『好，現在你欠我一個有誠意的補償。』", "回：『我有點在意，但可以補過。』", "嘴上說沒事，心裡風暴十級", "直接大吵：『你根本不在乎我。』"], w: [2.0, 1.5, 0.5, 0.0] },
{ s: "對方問：『你喜歡我什麼？』", o: ["回：『喜歡你有眼光，剛好看上我。』", "回：『喜歡你很有自己味道。』", "開始認真列出一長串優點", "回：『不知道耶。』"], w: [2.0, 1.5, 0.5, 0.0] },
{ s: "對方想看你的手機。", o: ["回：『可以，但看完記得對我負責。』", "回：『我不愛查手機，但你可以直接問我。』", "突然很緊張", "直接炸毛吵架"], w: [2.0, 1.5, 0.5, 0.0] },
{ s: "冷戰中，對方突然傳來一張寵物照。", o: ["回：『這位小朋友是來替你求和的？』", "回：『很可愛，主人今天態度也有進步嗎？』", "回：『可愛。』", "已讀不回繼續硬碰硬"], w: [2.0, 1.5, 0.5, 0.0] },
{ s: "對方問：『我今天有什麼不一樣？』", o: ["回：『有，今天特別像來偷我心的。』", "回：『你是不是換了髮型/穿搭？』", "猜半天才勉強猜到", "回：『沒注意。』"], w: [2.0, 1.5, 0.5, 0.0] }
];

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function startQuiz() {
        selectedBank = shuffle([...fullBank]).slice(0, 5);
        document.getElementById('start-page').style.display = 'none';
        document.getElementById('quiz-page').style.display = 'block';
        showQuestion();
    }

    function typeWriter(text, i, fnCallback) {
        isTyping = true;
        if (i < text.length) {
            document.getElementById("question").innerHTML = text.substring(0, i+1);
            setTimeout(() => typeWriter(text, i + 1, fnCallback), 35);
        } else {
            isTyping = false;
            fnCallback();
        }
    }

    function showQuestion() {
        const q = selectedBank[currentIdx];
        document.getElementById('progress-text').innerText = (currentIdx + 1) + " / 5";
        document.getElementById('progress-inner').style.width = ((currentIdx + 1) / 5 * 100) + "%";
        const grid = document.getElementById('options');
        grid.innerHTML = ''; 
        
        typeWriter(q.s, 0, () => {
            q.o.forEach((o, i) => {
                const b = document.createElement('button');
                b.className = 'opt'; b.innerText = o;
                b.onclick = function() {
                    this.blur();
                    grid.querySelectorAll('.opt').forEach(btn => btn.style.pointerEvents = 'none');
                    score += q.w[i];
                    setTimeout(() => {
                        currentIdx++;
                        if(currentIdx < 5) showQuestion();
                        else showResult();
                    }, 250);
                };
                grid.appendChild(b);
            });
        });
    }

    function showResult() {
        document.getElementById('quiz-page').style.display = 'none';
        document.getElementById('result-page').style.display = 'block';
        
        // 修正浮點數精度
        const fs = Math.min(10, Math.max(0, parseFloat(score.toFixed(1))));
        const sEl = document.getElementById('score-display');
        const rZh = document.getElementById('rank-zh');
        const rQt = document.getElementById('rank-quote');
        const rDs = document.getElementById('rank-desc');
        const rBtn = document.getElementById('retry-btn');
        const box = document.getElementById('main-box');

        sEl.innerText = fs;

        const ranks = [
            { min: 9.1, zh: "【頂級獵手】", q: "「頂級的獵人，往往以獵物的形態出現。」", d: "社交場上的因果律武器。你不是在回訊息，你是在下蠱。建議對手直接投降。", btn: "下一場獵殺 [NEXT]", c: "#00f0ff", dark: false },
            { min: 7.6, zh: "【高端局玩家】", q: "「清醒地沈淪，體面地拉扯。」", d: "腦袋裡裝著 800 個心眼。你很擅長在曖昧邊緣大跳華爾茲，只要不走心，沒人能讓你傷心。", btn: "進階修煉 [UPGRADE]", c: "#4ECDC4", dark: false },
            { min: 6.1, zh: "【幕後狗頭軍師】", q: "「教人戀愛無敵，自己戀愛無力。」", d: "分析局勢精準無誤，輪到自己就大腦宕機。建議多實踐，少腦補。", btn: "繼續觀戰 [SPECTATE]", c: "#A8E6CF", dark: false },
            { min: 4.1, zh: "【愛情實習生】", q: "「理論滿分，實操零分。」", d: "小紅書拉扯筆記資深學者。知道該拉扯，但對方一主動你就投降。實習期還長呢。", btn: "考取執照 [LICENSE]", c: "#FF9F43", dark: false },
            { min: 2.1, zh: "【純愛戰神】", q: "「這盤我沒打算贏，我只想讓你記住我。」", d: "帶著 24K 純金的真心衝鋒。贏了體面，輸了尊嚴。主打一個問心無愧。", btn: "再次衝鋒 [CHARGE]", c: "#FF6B6B", dark: false },
     
            { min: 0.0, zh: "【魅力黑洞】", q: "「只要我夠笨拙，尷尬的就是對方。」", d: "精準避開所有心動訊號。任何曖昧遇到你都會瞬間石化。你是社交絕緣體。", btn: "重新做人 [REBORN]", c: "#BD00FF", dark: true }
        ];

        const r = ranks.find(rank => fs >= rank.min) || ranks[ranks.length-1];
        rZh.innerText = r.zh; rQt.innerText = r.q; rDs.innerText = r.d; rBtn.innerText = r.btn;
        sEl.style.color = r.c; rBtn.style.backgroundColor = r.c;
        document.documentElement.style.setProperty('--theme-color', r.c);

        if(r.dark) {
            document.body.classList.add('black-mode'); box.classList.add('dark-container');
            rDs.classList.add('dark-subtext'); rQt.classList.add('dark-subtext');
        }
    }
</script>
</body>
</html>
